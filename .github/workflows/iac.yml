name: IaC (Terraform)

# Valida el IaC multinube en cada cambio. El `plan` real requiere credenciales
# (se activa solo si el repo tiene configurado el rol OIDC de AWS).
on:
  push:
    paths: ["infra/terraform/**"]
  pull_request:
    paths: ["infra/terraform/**"]

permissions:
  contents: read
  id-token: write # para OIDC hacia AWS (plan)

env:
  TF_VERSION: "1.9.8"

jobs:
  validate:
    name: fmt · validate · checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform -chdir=infra/terraform fmt -recursive -check -diff

      - name: terraform validate (todos los stacks)
        run: |
          set -e
          for d in infra/terraform/bootstrap infra/terraform/stacks/*/; do
            echo "== validate $d =="
            terraform -chdir="$d" init -backend=false -input=false >/dev/null
            terraform -chdir="$d" validate
          done

      - name: checkov (seguridad del IaC)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: true # reporta sin romper el build (endurecer cuando se estabilice)
          output_format: cli

  plan:
    name: terraform plan (AWS)
    runs-on: ubuntu-latest
    needs: validate
    # Solo corre si el rol OIDC está configurado (variable de repo AWS_PLAN_ROLE_ARN).
    if: ${{ vars.AWS_PLAN_ROLE_ARN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform plan (10-aws-empi)
        working-directory: infra/terraform/stacks/10-aws-empi
        run: |
          terraform init -backend-config=backend.hcl
          terraform plan -input=false -no-color
